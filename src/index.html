<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>easyenv</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#fff;--bg2:#fafafa;--bg3:#f7f7f7;--bg4:#f0f0f0;--bg5:#f5f5f5;
  --fg:#111;--fg2:#888;--fg3:#aaa;--fg4:#ccc;--fg5:#ddd;
  --border:#e8e8e8;--border2:#e0e0e0;--border3:#eee;
  --btn-bg:#111;--btn-fg:#fff;
  --green-bg:#EAF3DE;--green-fg:#27500A;
  --amber-bg:#FAEEDA;--amber-fg:#633806;--amber-bar:#BA7517;--amber-track:#FAC775;
  --red-bg:#FCEBEB;--red-fg:#791F1F;
  --red-action:#A32D2D;
  --disabled:#ddd;
  --logo-bg:#111;--logo-fg:#fff;
  --radius:6px;--radius-lg:12px;--radius-pill:12px;
}
[data-theme="dark"]{
  --bg:#111;--bg2:#161616;--bg3:#1a1a1a;--bg4:#222;--bg5:#222;
  --fg:#e5e5e5;--fg2:#777;--fg3:#555;--fg4:#444;--fg5:#333;
  --border:#222;--border2:#333;--border3:#1c1c1c;
  --btn-bg:#e5e5e5;--btn-fg:#111;
  --green-bg:#27500A;--green-fg:#C0DD97;
  --amber-bg:#412402;--amber-fg:#FAC775;--amber-bar:#EF9F27;--amber-track:#633806;
  --red-bg:#501313;--red-fg:#F7C1C1;
  --red-action:#F09595;
  --disabled:#333;
  --logo-bg:#e5e5e5;--logo-fg:#111;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;
  display:flex;font-size:13px;
}
/* Sidebar */
.sidebar{
  width:200px;background:var(--bg2);border-right:0.5px solid var(--border);
  display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;
}
.logo{padding:0 20px 24px;display:flex;align-items:center;gap:8px;}
.logo svg{flex-shrink:0;}
.logo span{font-size:15px;font-weight:500;letter-spacing:.3px;}
.nav{flex:1;}
.nav-item{
  padding:9px 20px;color:var(--fg3);font-size:13px;cursor:pointer;
  border-left:2px solid transparent;transition:all .15s;
}
.nav-item:hover{color:var(--fg2);}
.nav-item.active{background:var(--bg4);color:var(--fg);font-weight:500;border-left-color:var(--fg);border-radius:0;}
.sidebar-footer{padding:12px 20px;border-top:0.5px solid var(--border);font-size:11px;color:var(--fg4);}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.page{display:none;flex:1;flex-direction:column;overflow:hidden;}
.page.active{display:flex;}

/* Toolbar */
.toolbar{
  padding:16px 24px;display:flex;align-items:center;gap:10px;
  border-bottom:0.5px solid var(--border);
}
.toolbar input[type="text"]{
  height:34px;background:var(--bg3);border:0.5px solid var(--border2);color:var(--fg);
  padding:0 12px;font-size:12px;border-radius:var(--radius);flex:1;min-width:100px;
  outline:none;
}
.toolbar input[type="text"]::placeholder{color:var(--fg3);}
.btn-group{display:flex;align-items:center;gap:8px;}
.btn{
  height:34px;line-height:34px;padding:0 16px;border-radius:var(--radius);
  font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:none;
  background:var(--btn-bg);color:var(--btn-fg);transition:opacity .15s;
}
.btn:hover{opacity:.85;}
.btn:disabled,.btn.disabled{opacity:.35;cursor:not-allowed;}
.btn-outline{
  background:transparent;border:0.5px solid var(--border2);color:var(--fg2);
}

/* Table */
.table-wrap{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
colgroup .col-check{width:44px;}
colgroup .col-name{width:16%;}
colgroup .col-soft{width:auto;}
colgroup .col-status{width:110px;}
colgroup .col-ops{width:160px;}
thead tr{border-bottom:0.5px solid var(--border3);}
th{text-align:left;padding:11px 8px;color:var(--fg3);font-weight:400;font-size:11px;}
th:first-child,td:first-child{text-align:center;padding-left:14px;padding-right:0;}
th:last-child,td:last-child{text-align:right;padding-right:16px;}
th.center,td.center{text-align:center;}
tbody tr{border-bottom:0.5px solid var(--border3);transition:background .1s;}
tbody tr:hover{background:var(--bg3);}
td{padding:13px 8px;}

/* Checkbox */
.check{
  width:15px;height:15px;border:1.5px solid var(--fg4);border-radius:3px;
  display:inline-flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;flex-shrink:0;
}
.check.checked{background:var(--btn-bg);border-color:var(--btn-bg);}
.check.checked svg path{stroke:var(--btn-fg);}

/* Status badges */
.badge{padding:3px 12px;border-radius:var(--radius-pill);font-size:11px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.badge-green{background:var(--green-bg);color:var(--green-fg);}
.badge-amber{background:var(--amber-bg);color:var(--amber-fg);}
.badge-red{background:var(--red-bg);color:var(--red-fg);}
.badge-gray{background:var(--bg5);color:var(--fg3);}
.mini-bar{width:50px;height:4px;background:var(--amber-track);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;background:var(--amber-bar);border-radius:2px;transition:width .3s;}

/* Ops */
.op{font-size:12px;cursor:pointer;margin-right:10px;color:var(--fg2);background:none;border:none;padding:0;}
.op:last-child{margin-right:0;}
.op.disabled{color:var(--disabled);cursor:not-allowed;pointer-events:none;}
.op.danger{color:var(--red-action);font-weight:500;}

/* Software cell */
.soft-cell{display:flex;align-items:center;gap:4px;color:var(--fg2);}
.soft-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.soft-info{
  width:16px;height:16px;border-radius:50%;background:var(--bg4);
  display:none;align-items:center;justify-content:center;cursor:pointer;
  font-size:11px;color:var(--fg3);font-weight:500;flex-shrink:0;font-style:normal;
}
td:hover .soft-info{display:flex;}

/* Modal overlay */
.modal-overlay{
  display:none;position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;
}
.modal-overlay.show{display:flex;}
.modal{
  background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);
  width:500px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;
}
.modal-header{
  padding:14px 20px;border-bottom:0.5px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.modal-header h3{font-size:14px;font-weight:500;}
.modal-close{color:var(--fg3);cursor:pointer;font-size:16px;background:none;border:none;}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-footer{
  padding:14px 20px;border-top:0.5px solid var(--border);
  display:flex;justify-content:flex-end;gap:8px;
}
.field{margin-bottom:14px;}
.field-label{font-size:11px;color:var(--fg3);margin-bottom:5px;}
.field-label .optional{color:var(--fg4);}
.field input,.field select{
  width:100%;height:34px;background:var(--bg3);border:0.5px solid var(--border2);
  color:var(--fg);padding:0 10px;border-radius:var(--radius);font-size:12px;outline:none;
}
.field-row{display:flex;gap:8px;}
.field-row .field{flex:1;}

/* Install items in create modal */
.install-list{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;}
.install-item{padding:14px;border-bottom:0.5px solid var(--border);}
.install-item:last-child{border-bottom:none;}
.install-item-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.drag-handle{color:var(--fg4);cursor:grab;font-size:14px;user-select:none;}
.item-num{font-size:12px;font-weight:500;}
.item-remove{margin-left:auto;color:var(--red-action);cursor:pointer;font-size:12px;background:none;border:none;}
.add-item{padding:12px;text-align:center;color:var(--fg2);font-size:12px;cursor:pointer;}
.add-item:hover{color:var(--fg);}
.env-check-row{display:flex;align-items:center;gap:6px;margin-top:6px;}
.env-check-row .check{width:14px;height:14px;}
.env-check-row span{font-size:11px;color:var(--fg2);}

/* Software list popup */
.soft-popup{
  background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);
  width:280px;overflow:hidden;
}
.soft-popup-header{
  padding:12px 16px;border-bottom:0.5px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.soft-popup-header span{font-size:13px;font-weight:500;}
.soft-popup-list{padding:8px 0;}
.soft-popup-item{padding:7px 16px;display:flex;align-items:center;gap:8px;font-size:12px;}
.soft-popup-dot{width:5px;height:5px;border-radius:50%;background:var(--fg);flex-shrink:0;}

/* Progress page */
.progress-header{
  padding:16px 24px;border-bottom:0.5px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.progress-header h2{font-size:15px;font-weight:500;}
.progress-header span{font-size:12px;color:var(--fg2);}
.progress-total{padding:14px 24px;border-bottom:0.5px solid var(--border);}
.progress-total-row{display:flex;justify-content:space-between;margin-bottom:6px;}
.progress-total-row span{font-size:11px;color:var(--fg2);}
.progress-total-row .pct{color:var(--fg);}
.bar{height:4px;background:var(--bg5);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;background:var(--fg);border-radius:2px;transition:width .4s;}
.timeline{flex:1;overflow-y:auto;padding:20px 24px;}
.tl-env{margin-bottom:22px;}
.tl-env-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.tl-icon{
  width:18px;height:18px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;flex-shrink:0;
}
.tl-icon.done{background:var(--green-bg);color:var(--green-fg);}
.tl-icon.running{background:var(--amber-bg);color:var(--amber-fg);}
.tl-icon.error{background:var(--red-bg);color:var(--red-fg);}
.tl-icon.pending{border:1.5px solid var(--fg4);}
.tl-env-name{font-weight:500;}
.tl-env-status{font-size:11px;margin-left:auto;}
.tl-tasks{margin-left:26px;border-left:0.5px solid var(--border);padding-left:16px;}
.tl-task{margin-bottom:8px;}
.tl-task-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.tl-task-name{font-size:12px;color:var(--fg2);}
.tl-task-pct{font-size:11px;}
.tl-task-bar{height:2px;background:var(--bg5);border-radius:1px;overflow:hidden;}
.tl-task-bar-fill{height:100%;border-radius:1px;transition:width .3s;}
.tl-error{
  font-size:11px;color:var(--red-fg);margin-top:4px;background:var(--red-bg);
  padding:6px 8px;border-radius:4px;font-family:monospace;
}

/* Settings page */
.settings{padding:24px;overflow-y:auto;flex:1;}
.settings-section{margin-bottom:28px;}
.settings-label{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.lang-grid{display:flex;flex-wrap:wrap;gap:6px;}
.lang-btn{
  padding:5px 14px;border-radius:var(--radius);font-size:12px;cursor:pointer;
  background:var(--bg);border:0.5px solid var(--border2);color:var(--fg2);transition:all .15s;
}
.lang-btn.active{background:var(--btn-bg);color:var(--btn-fg);border-color:var(--btn-bg);}
.theme-grid{display:flex;gap:12px;}
.theme-card{
  width:80px;text-align:center;cursor:pointer;
}
.theme-preview{
  height:48px;border-radius:var(--radius);margin-bottom:6px;
  display:flex;align-items:center;justify-content:center;
  border:0.5px solid var(--border2);
}
.theme-card.active .theme-preview{border:2px solid var(--fg);}
.theme-card span{font-size:11px;color:var(--fg2);}
.theme-card.active span{color:var(--fg);font-weight:500;}
.about-link{font-size:12px;color:var(--fg);text-decoration:underline;cursor:pointer;}
.donate-grid{display:flex;gap:10px;}
.donate-card{
  width:100px;text-align:center;background:var(--bg);border:0.5px solid var(--border2);
  border-radius:var(--radius);padding:12px 8px;cursor:pointer;
}
.donate-qr{
  width:48px;height:48px;background:var(--bg4);border-radius:4px;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--fg3);
}
.donate-card span{font-size:11px;color:var(--fg2);}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--fg4);border-radius:3px;}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 80 80" id="logo-svg">
      <rect width="80" height="80" rx="16" fill="var(--logo-bg)"/>
      <text x="16" y="50" font-size="30" font-weight="500" fill="var(--logo-fg)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif">E</text>
      <text x="64" y="50" font-size="30" font-weight="500" fill="var(--logo-fg)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif" transform="scale(-1,1)" transform-origin="64 40">E</text>
    </svg>
    <span>easyenv</span>
  </div>
  <div class="nav">
    <div class="nav-item active" data-page="config" data-i18n="nav_config">环境配置</div>
    <div class="nav-item" data-page="progress" data-i18n="nav_progress">安装进度</div>
    <div class="nav-item" data-page="settings" data-i18n="nav_settings">系统设置</div>
  </div>
  <div class="sidebar-footer">v0.1.0</div>
</div>

<div class="main">
  <!-- Page: Config -->
  <div class="page active" id="page-config">
    <div class="toolbar">
      <input type="text" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="搜索环境名称...">
      <div class="btn-group">
        <button class="btn" id="btn-search" data-i18n="btn_search">搜索</button>
        <button class="btn" id="btn-create" data-i18n="btn_create">+ 创建</button>
        <button class="btn" id="btn-install" data-i18n="btn_install">安装</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <colgroup>
          <col class="col-check"><col class="col-name"><col class="col-soft">
          <col class="col-status"><col class="col-ops">
        </colgroup>
        <thead>
          <tr>
            <th class="center"><div class="check" id="check-all"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="var(--btn-fg)" stroke-width="1.5" fill="none"/></svg></div></th>
            <th data-i18n="th_name">环境名称</th>
            <th data-i18n="th_software">软件列表</th>
            <th class="center" data-i18n="th_status">状态</th>
            <th style="text-align:right" data-i18n="th_ops">操作</th>
          </tr>
        </thead>
        <tbody id="env-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Page: Progress -->
  <div class="page" id="page-progress">
    <div class="progress-header">
      <h2 data-i18n="nav_progress">安装进度</h2>
      <span id="progress-summary"></span>
    </div>
    <div class="progress-total">
      <div class="progress-total-row">
        <span data-i18n="total_progress">总体进度</span>
        <span class="pct" id="total-pct">0%</span>
      </div>
      <div class="bar"><div class="bar-fill" id="total-bar" style="width:0%"></div></div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>

  <!-- Page: Settings -->
  <div class="page" id="page-settings">
    <div class="progress-header">
      <h2 data-i18n="nav_settings">系统设置</h2>
    </div>
    <div class="settings">
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_lang">语言 / Language</div>
        <div class="lang-grid" id="lang-grid"></div>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_theme">主题</div>
        <div class="theme-grid">
          <div class="theme-card active" data-theme-val="light">
            <div class="theme-preview" style="background:#fff;"><div style="width:24px;height:3px;background:#ddd;border-radius:1px;"></div></div>
            <span data-i18n="theme_light">白天</span>
          </div>
          <div class="theme-card" data-theme-val="dark">
            <div class="theme-preview" style="background:#111;"><div style="width:24px;height:3px;background:#333;border-radius:1px;"></div></div>
            <span data-i18n="theme_dark">夜间</span>
          </div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_update">更新</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:12px;color:var(--fg2);" data-i18n="current_version">当前版本: v0.1.0</span>
          <button class="btn btn-outline" data-i18n="check_update">检查更新</button>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_about">关于</div>
        <span class="about-link" onclick="openLink('https://github.com/yourname/easyenv')">github.com/yourname/easyenv</span>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_donate">赞赏</div>
        <div class="donate-grid">
          <div class="donate-card"><div class="donate-qr">QR</div><span data-i18n="alipay">支付宝</span></div>
          <div class="donate-card"><div class="donate-qr">QR</div><span data-i18n="wechat">微信</span></div>
          <div class="donate-card"><div class="donate-qr">QR</div><span>PayPal</span></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Create/Edit Modal -->
<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modal-title" data-i18n="create_env">创建环境</h3>
      <button class="modal-close" onclick="closeModal('modal-create')">&#10005;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <div class="field-label" data-i18n="env_name">环境名称</div>
        <input type="text" id="modal-env-name" placeholder="">
      </div>
      <div class="field-label" data-i18n="install_list">安装软件列表</div>
      <div class="install-list" id="install-list"></div>
      <div class="add-item" id="add-install-item" data-i18n="add_item">+ 添加安装项</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-create')" data-i18n="btn_cancel">取消</button>
      <button class="btn" id="btn-save-env" data-i18n="btn_save">保存</button>
    </div>
  </div>
</div>

<!-- Software List Popup -->
<div class="modal-overlay" id="modal-softlist">
  <div class="soft-popup">
    <div class="soft-popup-header">
      <span id="softlist-title"></span>
      <button class="modal-close" onclick="closeModal('modal-softlist')">&#10005;</button>
    </div>
    <div class="soft-popup-list" id="softlist-body"></div>
  </div>
</div>

// ============================================================
// Render table
// ============================================================
function getSoftwareDisplayName(s){
  return s.name || s.folder;
}
function getSoftwareShortList(env){
  const names = env.software.map(getSoftwareDisplayName);
  if(names.length <= 2) return names.join(', ');
  return names.slice(0,2).join(', ') + ' ...';
}
function renderTable(){
  const tbody = document.getElementById('env-tbody');
  let filtered = environments;
  if(searchQuery){
    const q = searchQuery.toLowerCase();
    filtered = environments.filter(e=>e.name.toLowerCase().includes(q));
  }
  tbody.innerHTML = filtered.map(env=>{
    const checked = selectedIds.has(env.id);
    const isInstalling = env.status==='installing';
    const showMore = env.software.length > 2;
    let statusHtml = '';
    if(env.status==='installed') statusHtml=`<span class="badge badge-green">${t('status_installed')}</span>`;
    else if(env.status==='installing') statusHtml=`<span class="badge badge-amber"><span class="mini-bar"><span class="mini-bar-fill" style="width:${env.progress}%"></span></span>${env.progress}%</span>`;
    else if(env.status==='failed') statusHtml=`<span class="badge badge-red">${t('status_failed')}</span>`;
    else statusHtml=`<span class="badge badge-gray">${t('status_not')}</span>`;
    return `<tr>
      <td class="center"><div class="check${checked?' checked':''}" onclick="toggleCheck(${env.id})"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="var(--btn-fg)" stroke-width="1.5" fill="none"/></svg></div></td>
      <td style="font-weight:500;">${esc(env.name)}</td>
      <td><div class="soft-cell"><span class="soft-text">${esc(getSoftwareShortList(env))}</span>${showMore?`<i class="soft-info" onclick="showSoftList(${env.id})">i</i>`:''}</div></td>
      <td class="center">${statusHtml}</td>
      <td style="text-align:right;white-space:nowrap;">
        <button class="op${isInstalling?' disabled':''}" onclick="editEnv(${env.id})">${t('op_edit')}</button>
        <button class="op${isInstalling?' disabled':''}" onclick="deleteEnv(${env.id})">${t('op_delete')}</button>
        <button class="op${isInstalling?' danger':' disabled'}" onclick="stopEnv(${env.id})">${t('op_stop')}</button>
      </td>
    </tr>`;
  }).join('');
  // Update check-all
  const allChecked = filtered.length>0 && filtered.every(e=>selectedIds.has(e.id));
  document.getElementById('check-all').className = 'check'+(allChecked?' checked':'');
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function toggleCheck(id){
  selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);
  renderTable();
}
document.getElementById('check-all').addEventListener('click',()=>{
  const allChecked = environments.every(e=>selectedIds.has(e.id));
  if(allChecked) selectedIds.clear();
  else environments.forEach(e=>selectedIds.add(e.id));
  renderTable();
});

let modalItems = [];
function openCreateModal(){
  editingId = null;
  document.getElementById('modal-title').textContent = t('create_env');
  document.getElementById('modal-env-name').value = '';
  modalItems = [{name:'',folder:'',dir:'',url:'',envVar:true}];
  renderInstallList();
  openModal('modal-create');
}
function editEnv(id){
  const env = environments.find(e=>e.id===id);
  if(!env||env.status==='installing') return;
  editingId = id;
  document.getElementById('modal-title').textContent = t('edit_env');
  document.getElementById('modal-env-name').value = env.name;
  modalItems = env.software.map(s=>({...s}));
  renderInstallList();
  openModal('modal-create');
}
function renderInstallList(){
  const list = document.getElementById('install-list');
  list.innerHTML = modalItems.map((item,i)=>`
    <div class="install-item" draggable="true" data-idx="${i}">
      <div class="install-item-header">
        <span class="drag-handle">⠿</span>
        <span class="item-num">${i+1}</span>
        <button class="item-remove" onclick="removeItem(${i})">${t('btn_remove')}</button>
      </div>
      <div class="field-row">
        <div class="field"><div class="field-label">${t('soft_name')} <span class="optional">${t('soft_name_opt')}</span></div>
          <input type="text" value="${esc(item.name)}" onchange="modalItems[${i}].name=this.value"></div>
        <div class="field"><div class="field-label">${t('folder_name')}</div>
          <input type="text" value="${esc(item.folder)}" onchange="modalItems[${i}].folder=this.value"></div>
      </div>
      <div class="field-row">
        <div class="field"><div class="field-label">${t('parent_dir')}</div>
          <input type="text" value="${esc(item.dir)}" onchange="modalItems[${i}].dir=this.value"></div>
      </div>
      <div class="field"><div class="field-label">${t('file_url')}</div>
        <input type="text" value="${esc(item.url)}" onchange="modalItems[${i}].url=this.value"></div>
      <div class="env-check-row">
        <div class="check${item.envVar?' checked':''}" onclick="modalItems[${i}].envVar=!modalItems[${i}].envVar;renderInstallList();">
          <svg width="8" height="8" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="var(--btn-fg)" stroke-width="1.5" fill="none"/></svg>
        </div>
        <span>${t('config_env_var')}</span>
      </div>
    </div>
  `).join('');
  // Drag & drop
  list.querySelectorAll('.install-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.idx);el.style.opacity='.4';});
    el.addEventListener('dragend',()=>{el.style.opacity='1';});
    el.addEventListener('dragover',e=>{e.preventDefault();});
    el.addEventListener('drop',e=>{
      e.preventDefault();
      const from=parseInt(e.dataTransfer.getData('text/plain'));
      const to=parseInt(el.dataset.idx);
      if(from!==to){const item=modalItems.splice(from,1)[0];modalItems.splice(to,0,item);renderInstallList();}
    });
  });
}
function removeItem(i){modalItems.splice(i,1);renderInstallList();}
document.getElementById('add-install-item').addEventListener('click',()=>{
  modalItems.push({name:'',folder:'',dir:'',url:'',envVar:true});
  renderInstallList();
});
document.getElementById('btn-save-env').addEventListener('click',()=>{
  const name = document.getElementById('modal-env-name').value.trim();
  if(!name) return;
  // Sync input values from DOM
  document.querySelectorAll('.install-item').forEach((el,i)=>{
    const inputs = el.querySelectorAll('input[type="text"]');
    if(inputs[0]) modalItems[i].name = inputs[0].value;
    if(inputs[1]) modalItems[i].folder = inputs[1].value;
    if(inputs[2]) modalItems[i].dir = inputs[2].value;
    if(inputs[3]) modalItems[i].url = inputs[3].value;
  });
  if(editingId){
    const env = environments.find(e=>e.id===editingId);
    if(env){env.name=name;env.software=[...modalItems];}
  } else {
    environments.push({id:nextId++,name,software:[...modalItems],status:'none',progress:0});
  }
  closeModal('modal-create');
  renderTable();
});

function deleteEnv(id){
  const env = environments.find(e=>e.id===id);
  if(!env||env.status==='installing') return;
  if(!confirm(t('confirm_delete'))) return;
  environments = environments.filter(e=>e.id!==id);
  selectedIds.delete(id);
  renderTable();
}
function stopEnv(id){
  const env = environments.find(e=>e.id===id);
  if(!env||env.status!=='installing') return;
  env.status='none';env.progress=0;
  renderTable();renderProgress();
}

// ============================================================
// Progress page
// ============================================================
function renderProgress(){
  const installing = environments.filter(e=>e.status==='installing'||e.status==='installed'||e.status==='failed');
  if(installing.length===0){
    document.getElementById('timeline').innerHTML=`<div style="text-align:center;color:var(--fg3);padding:40px;">${t('no_env_hint')}</div>`;
    document.getElementById('total-pct').textContent='0%';
    document.getElementById('total-bar').style.width='0%';
    document.getElementById('progress-summary').textContent='';
    return;
  }
  const done=installing.filter(e=>e.status==='installed').length;
  const total=installing.length;
  const avgProgress=Math.round(installing.reduce((s,e)=>s+e.progress,0)/total);
  document.getElementById('total-pct').textContent=avgProgress+'%';
  document.getElementById('total-bar').style.width=avgProgress+'%';
  document.getElementById('progress-summary').textContent=`${done}/${total}`;

  document.getElementById('timeline').innerHTML = installing.map(env=>{
    let iconClass='pending',statusText=t('progress_pending'),statusColor='var(--fg3)';
    if(env.status==='installed'){iconClass='done';statusText=t('progress_done');statusColor='var(--green-fg)';}
    else if(env.status==='installing'){iconClass='running';statusText=env.progress+'%';statusColor='var(--amber-fg)';}
    else if(env.status==='failed'){iconClass='error';statusText=t('progress_error');statusColor='var(--red-fg)';}
    const tasks = env.software.map((s,i)=>{
      const softName=getSoftwareDisplayName(s);
      let pct=0,barColor='var(--bg5)',pctColor='var(--fg3)';
      if(env.status==='installed'){pct=100;barColor='var(--green-fg)';pctColor='var(--green-fg)';}
      else if(env.status==='installing'){
        const perTask=100/env.software.length;
        const done=Math.floor(env.progress/perTask);
        if(i<done){pct=100;barColor='var(--green-fg)';pctColor='var(--green-fg)';}
        else if(i===done){pct=Math.round((env.progress-done*perTask)/perTask*100);barColor='var(--amber-bar)';pctColor='var(--amber-fg)';}
      } else if(env.status==='failed'){pct=0;barColor='var(--red-fg)';pctColor='var(--red-fg)';}
      return `<div class="tl-task">
        <div class="tl-task-row"><span class="tl-task-name">${esc(softName)}</span><span class="tl-task-pct" style="color:${pctColor}">${pct}%</span></div>
        <div class="tl-task-bar"><div class="tl-task-bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
      </div>`;
    }).join('');
    return `<div class="tl-env">
      <div class="tl-env-header">
        <div class="tl-icon ${iconClass}">${iconClass==='done'?'&#10003;':iconClass==='error'?'&#10005;':iconClass==='running'?'&#8250;':''}</div>
        <span class="tl-env-name">${esc(env.name)}</span>
        <span class="tl-env-status" style="color:${statusColor}">${statusText}</span>
      </div>
      <div class="tl-tasks">${tasks}</div>
    </div>`;
  }).join('');
}

// Demo: simulate progress
function simulateProgress(){
  const interval = setInterval(()=>{
    let anyRunning = false;
    environments.forEach(env=>{
      if(env.status==='installing'){
        anyRunning=true;
        env.progress = Math.min(100, env.progress + Math.floor(Math.random()*8)+2);
        if(env.progress>=100){env.status='installed';env.progress=100;}
      }
    });
    renderTable();renderProgress();
    if(!anyRunning) clearInterval(interval);
  },600);
}
