<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>easyenv</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#fff;--bg2:#fafafa;--bg3:#f7f7f7;--bg4:#f0f0f0;--bg5:#f5f5f5;
  --fg:#111;--fg2:#888;--fg3:#aaa;--fg4:#ccc;--fg5:#ddd;
  --border:#e8e8e8;--border2:#e0e0e0;--border3:#eee;
  --btn-bg:#111;--btn-fg:#fff;
  --green-bg:#EAF3DE;--green-fg:#27500A;
  --amber-bg:#FAEEDA;--amber-fg:#633806;--amber-bar:#BA7517;--amber-track:#FAC775;
  --red-bg:#FCEBEB;--red-fg:#791F1F;--red-action:#A32D2D;
  --disabled:#ddd;--logo-bg:#111;--logo-fg:#fff;
  --radius:6px;--radius-lg:12px;--radius-pill:12px;
}
[data-theme="dark"]{
  --bg:#111;--bg2:#161616;--bg3:#1a1a1a;--bg4:#222;--bg5:#222;
  --fg:#e5e5e5;--fg2:#777;--fg3:#555;--fg4:#444;--fg5:#333;
  --border:#222;--border2:#333;--border3:#1c1c1c;
  --btn-bg:#e5e5e5;--btn-fg:#111;
  --green-bg:#27500A;--green-fg:#C0DD97;
  --amber-bg:#412402;--amber-fg:#FAC775;--amber-bar:#EF9F27;--amber-track:#633806;
  --red-bg:#501313;--red-fg:#F7C1C1;--red-action:#F09595;
  --disabled:#333;--logo-bg:#e5e5e5;--logo-fg:#111;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--fg);height:100vh;overflow:hidden;display:flex;font-size:13px;}
.sidebar{width:200px;background:var(--bg2);border-right:0.5px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0;}
.logo{padding:0 20px 24px;display:flex;align-items:center;gap:8px;}
.logo svg{flex-shrink:0;} .logo span{font-size:15px;font-weight:500;letter-spacing:.3px;}
.nav{flex:1;} .nav-item{padding:9px 20px;color:var(--fg3);font-size:13px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;}
.nav-item:hover{color:var(--fg2);} .nav-item.active{background:var(--bg4);color:var(--fg);font-weight:500;border-left-color:var(--fg);border-radius:0;}
.sidebar-footer{padding:12px 20px;border-top:0.5px solid var(--border);font-size:11px;color:var(--fg4);}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.page{display:none;flex:1;flex-direction:column;overflow:hidden;} .page.active{display:flex;}
.toolbar{padding:16px 24px;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid var(--border);}
.toolbar input[type="text"]{height:34px;background:var(--bg3);border:0.5px solid var(--border2);color:var(--fg);padding:0 12px;font-size:12px;border-radius:var(--radius);flex:1;min-width:100px;outline:none;}
.toolbar input::placeholder{color:var(--fg3);}
.btn-group{display:flex;align-items:center;gap:8px;}
.btn{height:34px;line-height:34px;padding:0 16px;border-radius:var(--radius);font-size:12px;font-weight:500;cursor:pointer;white-space:nowrap;border:none;background:var(--btn-bg);color:var(--btn-fg);transition:opacity .15s;}
.btn:hover{opacity:.85;} .btn:disabled,.btn.disabled{opacity:.35;cursor:not-allowed;}
.btn-outline{background:transparent;border:0.5px solid var(--border2);color:var(--fg2);}
.table-wrap{flex:1;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
colgroup .col-check{width:44px;} colgroup .col-name{width:16%;} colgroup .col-soft{width:auto;} colgroup .col-status{width:110px;} colgroup .col-ops{width:160px;}
thead tr{border-bottom:0.5px solid var(--border3);}
th{text-align:left;padding:11px 8px;color:var(--fg3);font-weight:400;font-size:11px;}
th:first-child,td:first-child{text-align:center;padding-left:14px;padding-right:0;}
th:last-child,td:last-child{text-align:right;padding-right:16px;}
th.center,td.center{text-align:center;}
tbody tr{border-bottom:0.5px solid var(--border3);transition:background .1s;} tbody tr:hover{background:var(--bg3);}
td{padding:13px 8px;}
.check{width:15px;height:15px;border:1.5px solid var(--fg4);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
.check.checked{background:var(--btn-bg);border-color:var(--btn-bg);} .check.checked svg path{stroke:var(--btn-fg);}
.badge{padding:3px 12px;border-radius:var(--radius-pill);font-size:11px;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.badge-green{background:var(--green-bg);color:var(--green-fg);}
.badge-amber{background:var(--amber-bg);color:var(--amber-fg);}
.badge-red{background:var(--red-bg);color:var(--red-fg);}
.badge-gray{background:var(--bg5);color:var(--fg3);}
.mini-bar{width:50px;height:4px;background:var(--amber-track);border-radius:2px;overflow:hidden;}
.mini-bar-fill{height:100%;background:var(--amber-bar);border-radius:2px;transition:width .3s;}
.op{font-size:12px;cursor:pointer;margin-right:10px;color:var(--fg2);background:none;border:none;padding:0;}
.op:last-child{margin-right:0;} .op.disabled{color:var(--disabled);cursor:not-allowed;pointer-events:none;} .op.danger{color:var(--red-action);font-weight:500;}
.soft-cell{display:flex;align-items:center;gap:4px;color:var(--fg2);}
.soft-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;}
.soft-info{width:16px;height:16px;border-radius:50%;background:var(--bg4);display:none;align-items:center;justify-content:center;cursor:pointer;font-size:11px;color:var(--fg3);font-weight:500;flex-shrink:0;font-style:normal;}
td:hover .soft-info{display:flex;}
.modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);width:500px;max-height:80vh;display:flex;flex-direction:column;overflow:hidden;}
.modal-header{padding:14px 20px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-header h3{font-size:14px;font-weight:500;}
.modal-close{color:var(--fg3);cursor:pointer;font-size:16px;background:none;border:none;}
.modal-body{padding:20px;overflow-y:auto;flex:1;}
.modal-footer{padding:14px 20px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end;gap:8px;}
.field{margin-bottom:14px;} .field-label{font-size:11px;color:var(--fg3);margin-bottom:5px;} .field-label .optional{color:var(--fg4);}
.field input{width:100%;height:34px;background:var(--bg3);border:0.5px solid var(--border2);color:var(--fg);padding:0 10px;border-radius:var(--radius);font-size:12px;outline:none;}
.field-row{display:flex;gap:8px;} .field-row .field{flex:1;}
.install-list{background:var(--bg3);border:0.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;}
.install-item{padding:14px;border-bottom:0.5px solid var(--border);} .install-item:last-child{border-bottom:none;}
.install-item-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.drag-handle{color:var(--fg4);cursor:grab;font-size:14px;user-select:none;}
.item-num{font-size:12px;font-weight:500;}
.item-remove{margin-left:auto;color:var(--red-action);cursor:pointer;font-size:12px;background:none;border:none;}
.add-item{padding:12px;text-align:center;color:var(--fg2);font-size:12px;cursor:pointer;} .add-item:hover{color:var(--fg);}
.env-check-row{display:flex;align-items:center;gap:6px;margin-top:6px;} .env-check-row .check{width:14px;height:14px;} .env-check-row span{font-size:11px;color:var(--fg2);}
.soft-popup{background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius-lg);width:280px;overflow:hidden;}
.soft-popup-header{padding:12px 16px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.soft-popup-header span{font-size:13px;font-weight:500;}
.soft-popup-list{padding:8px 0;} .soft-popup-item{padding:7px 16px;display:flex;align-items:center;gap:8px;font-size:12px;}
.soft-popup-dot{width:5px;height:5px;border-radius:50%;background:var(--fg);flex-shrink:0;}
.progress-header{padding:16px 24px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.progress-header h2{font-size:15px;font-weight:500;} .progress-header span{font-size:12px;color:var(--fg2);}
.progress-total{padding:14px 24px;border-bottom:0.5px solid var(--border);}
.progress-total-row{display:flex;justify-content:space-between;margin-bottom:6px;} .progress-total-row span{font-size:11px;color:var(--fg2);} .progress-total-row .pct{color:var(--fg);}
.bar{height:4px;background:var(--bg5);border-radius:2px;overflow:hidden;} .bar-fill{height:100%;background:var(--fg);border-radius:2px;transition:width .4s;}
.timeline{flex:1;overflow-y:auto;padding:20px 24px;}
.tl-env{margin-bottom:22px;} .tl-env-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.tl-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
.tl-icon.done{background:var(--green-bg);color:var(--green-fg);} .tl-icon.running{background:var(--amber-bg);color:var(--amber-fg);}
.tl-icon.error{background:var(--red-bg);color:var(--red-fg);} .tl-icon.pending{border:1.5px solid var(--fg4);}
.tl-env-name{font-weight:500;} .tl-env-status{font-size:11px;margin-left:auto;}
.tl-tasks{margin-left:26px;border-left:0.5px solid var(--border);padding-left:16px;}
.tl-task{margin-bottom:8px;} .tl-task-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
.tl-task-name{font-size:12px;color:var(--fg2);} .tl-task-pct{font-size:11px;}
.tl-task-bar{height:2px;background:var(--bg5);border-radius:1px;overflow:hidden;} .tl-task-bar-fill{height:100%;border-radius:1px;transition:width .3s;}
.settings{padding:24px;overflow-y:auto;flex:1;} .settings-section{margin-bottom:28px;}
.settings-label{font-size:11px;color:var(--fg3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.lang-grid{display:flex;flex-wrap:wrap;gap:6px;}
.lang-btn{padding:5px 14px;border-radius:var(--radius);font-size:12px;cursor:pointer;background:var(--bg);border:0.5px solid var(--border2);color:var(--fg2);transition:all .15s;}
.lang-btn.active{background:var(--btn-bg);color:var(--btn-fg);border-color:var(--btn-bg);}
.theme-grid{display:flex;gap:12px;} .theme-card{width:80px;text-align:center;cursor:pointer;}
.theme-preview{height:48px;border-radius:var(--radius);margin-bottom:6px;display:flex;align-items:center;justify-content:center;border:0.5px solid var(--border2);}
.theme-card.active .theme-preview{border:2px solid var(--fg);} .theme-card span{font-size:11px;color:var(--fg2);} .theme-card.active span{color:var(--fg);font-weight:500;}
.about-link{font-size:12px;color:var(--fg);text-decoration:underline;cursor:pointer;}
.donate-grid{display:flex;gap:10px;}
.donate-card{width:100px;text-align:center;background:var(--bg);border:0.5px solid var(--border2);border-radius:var(--radius);padding:12px 8px;cursor:pointer;}
.donate-qr{width:48px;height:48px;border-radius:4px;margin:0 auto 8px;overflow:hidden;} .donate-qr img{width:48px;height:48px;object-fit:cover;border-radius:4px;}
.donate-card span{font-size:11px;color:var(--fg2);}
.qr-preview-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;cursor:pointer;}
.qr-preview-overlay.show{display:flex;} .qr-preview-overlay img{max-width:320px;max-height:320px;border-radius:12px;}
.empty-hint{text-align:center;color:var(--fg3);padding:60px 20px;font-size:13px;}
.update-result{font-size:12px;margin-top:8px;}
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:var(--fg4);border-radius:3px;}
</style>
</head>
<body>
<div class="sidebar">
  <div class="logo">
    <svg width="28" height="28" viewBox="0 0 80 80">
      <rect width="80" height="80" rx="16" fill="var(--logo-bg)"/>
      <text x="16" y="50" font-size="30" font-weight="500" fill="var(--logo-fg)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif">E</text>
      <text x="64" y="50" font-size="30" font-weight="500" fill="var(--logo-fg)" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,system-ui,sans-serif" transform="scale(-1,1)" transform-origin="64 40">E</text>
    </svg>
    <span>easyenv</span>
  </div>
  <div class="nav">
    <div class="nav-item active" data-page="config" data-i18n="nav_config">环境配置</div>
    <div class="nav-item" data-page="progress" data-i18n="nav_progress">安装进度</div>
    <div class="nav-item" data-page="settings" data-i18n="nav_settings">系统设置</div>
  </div>
  <div class="sidebar-footer">v0.1.3</div>
</div>
<div class="main">
  <div class="page active" id="page-config">
    <div class="toolbar">
      <input type="text" id="search-input" data-i18n-placeholder="search_placeholder" placeholder="搜索环境名称...">
      <div class="btn-group">
        <button class="btn" id="btn-search" data-i18n="btn_search">搜索</button>
        <button class="btn" id="btn-create" data-i18n="btn_create">+ 创建</button>
        <button class="btn" id="btn-install" data-i18n="btn_install">安装</button>
      </div>
    </div>
    <div class="table-wrap">
      <table><colgroup><col class="col-check"><col class="col-name"><col class="col-soft"><col class="col-status"><col class="col-ops"></colgroup>
        <thead><tr>
          <th class="center"><div class="check" id="check-all"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="var(--btn-fg)" stroke-width="1.5" fill="none"/></svg></div></th>
          <th data-i18n="th_name">环境名称</th><th data-i18n="th_software">软件列表</th>
          <th class="center" data-i18n="th_status">状态</th><th style="text-align:right" data-i18n="th_ops">操作</th>
        </tr></thead>
        <tbody id="env-tbody"></tbody>
      </table>
      <div class="empty-hint" id="empty-hint" data-i18n="empty_config_hint">点击「+ 创建」添加开发环境</div>
    </div>
  </div>
  <div class="page" id="page-progress">
    <div class="progress-header"><h2 data-i18n="nav_progress">安装进度</h2><span id="progress-summary"></span></div>
    <div class="progress-total">
      <div class="progress-total-row"><span data-i18n="total_progress">总体进度</span><span class="pct" id="total-pct">0%</span></div>
      <div class="bar"><div class="bar-fill" id="total-bar" style="width:0%"></div></div>
    </div>
    <div class="timeline" id="timeline"></div>
  </div>
  <div class="page" id="page-settings">
    <div class="progress-header"><h2 data-i18n="nav_settings">系统设置</h2></div>
    <div class="settings">
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_lang">语言 / Language</div>
        <div class="lang-grid" id="lang-grid"></div>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_theme">主题</div>
        <div class="theme-grid">
          <div class="theme-card active" data-theme-val="light"><div class="theme-preview" style="background:#fff;"><div style="width:24px;height:3px;background:#ddd;border-radius:1px;"></div></div><span data-i18n="theme_light">白天</span></div>
          <div class="theme-card" data-theme-val="dark"><div class="theme-preview" style="background:#111;"><div style="width:24px;height:3px;background:#333;border-radius:1px;"></div></div><span data-i18n="theme_dark">夜间</span></div>
        </div>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_update">更新</div>
        <div style="display:flex;align-items:center;gap:12px;">
          <span style="font-size:12px;color:var(--fg2);" data-i18n="current_version">当前版本: v0.1.3</span>
          <button class="btn btn-outline" id="btn-check-update" data-i18n="check_update">检查更新</button>
        </div>
        <div class="update-result" id="update-result"></div>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_about">关于</div>
        <span class="about-link" onclick="openLink('https://github.com/yokeay/easy-env')">github.com/yokeay/easy-env</span>
      </div>
      <div class="settings-section">
        <div class="settings-label" data-i18n="settings_donate">赞赏</div>
        <div class="donate-grid">
          <div class="donate-card" onclick="showQR('https://qnm.hunliji.com/o_1jlilq3m11508dt9jbgu6ij0rc.png')"><div class="donate-qr"><img src="https://qnm.hunliji.com/o_1jlilq3m11508dt9jbgu6ij0rc.png"></div><span data-i18n="alipay">支付宝</span></div>
          <div class="donate-card" onclick="showQR('https://qnm.hunliji.com/o_1jlilq3m1t0akh814bn3mq1eurd.png')"><div class="donate-qr"><img src="https://qnm.hunliji.com/o_1jlilq3m1t0akh814bn3mq1eurd.png"></div><span data-i18n="wechat">微信</span></div>
          <div class="donate-card" onclick="showQR('https://qnm.hunliji.com/o_1jlilq3m1c8e6nm1727hlp1rdpb.png')"><div class="donate-qr"><img src="https://qnm.hunliji.com/o_1jlilq3m1c8e6nm1727hlp1rdpb.png"></div><span>PayPal</span></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-create">
  <div class="modal">
    <div class="modal-header"><h3 id="modal-title" data-i18n="create_env">创建环境</h3><button class="modal-close" onclick="closeModal('modal-create')">&#10005;</button></div>
    <div class="modal-body">
      <div class="field"><div class="field-label" data-i18n="env_name">环境名称</div><input type="text" id="modal-env-name"></div>
      <div class="field-label" data-i18n="install_list">安装软件列表</div>
      <div class="install-list" id="install-list"></div>
      <div class="add-item" id="add-install-item" data-i18n="add_item">+ 添加安装项</div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('modal-create')" data-i18n="btn_cancel">取消</button>
      <button class="btn" id="btn-save-env" data-i18n="btn_save">保存</button>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-softlist">
  <div class="soft-popup">
    <div class="soft-popup-header"><span id="softlist-title"></span><button class="modal-close" onclick="closeModal('modal-softlist')">&#10005;</button></div>
    <div class="soft-popup-list" id="softlist-body"></div>
  </div>
</div>
<div class="qr-preview-overlay" id="qr-preview" onclick="this.classList.remove('show')"><img id="qr-preview-img" src=""></div>

let currentLang='zh';
function t(k){return(LANGS[currentLang]||{})[k]||(LANGS.zh)[k]||(LANGS.en)[k]||k;}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const k=el.getAttribute('data-i18n');if(t(k))el.textContent=t(k);});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const k=el.getAttribute('data-i18n-placeholder');if(t(k))el.placeholder=t(k);});
  renderTable();renderProgress();
}

let currentTheme='light';
function setTheme(th){
  currentTheme=th;
  if(th==='dark')document.documentElement.setAttribute('data-theme','dark');
  else document.documentElement.removeAttribute('data-theme');
  document.querySelectorAll('.theme-card').forEach(c=>c.classList.toggle('active',c.dataset.themeVal===th));
}

document.querySelectorAll('.nav-item').forEach(item=>{
  item.addEventListener('click',()=>{
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

// ============================================================
// Data
// ============================================================
let environments=[];
let selectedIds=new Set();
let nextId=1;
let editingId=null;
let searchQuery='';

// ============================================================
// Persistence
// ============================================================
async function loadFromDisk(){
  if(!hasTauri)return;
  try{
    const data=await tauriInvoke('load_config');
    if(data&&data.length){
      environments=data;
      nextId=Math.max(...environments.map(e=>e.id))+1;
      // Reset any stale "installing" status from last session
      environments.forEach(e=>{if(e.status==='installing'){e.status='none';e.progress=0;}});
    }
  }catch(e){console.error('load_config',e);}
}
function saveToDisk(){
  if(!hasTauri)return;
  const data=environments.map(e=>({id:e.id,name:e.name,software:e.software,status:e.status,progress:e.progress}));
  tauriInvoke('save_config',{envs:data}).catch(e=>console.error('save_config',e));
}

// ============================================================
// Render
// ============================================================
function getSoftwareDisplayName(s){return s.name||s.folder;}
function getSoftwareShortList(env){
  const n=env.software.map(getSoftwareDisplayName);
  return n.length<=2?n.join(', '):n.slice(0,2).join(', ')+' ...';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function renderTable(){
  const tbody=document.getElementById('env-tbody');
  let filtered=environments;
  if(searchQuery){const q=searchQuery.toLowerCase();filtered=environments.filter(e=>e.name.toLowerCase().includes(q));}
  document.getElementById('empty-hint').style.display=environments.length===0?'block':'none';
  tbody.innerHTML=filtered.map(env=>{
    const checked=selectedIds.has(env.id);
    const busy=env.status==='installing';
    const more=env.software.length>2;
    let st='';
    if(env.status==='installed')st=`<span class="badge badge-green">${t('status_installed')}</span>`;
    else if(env.status==='installing')st=`<span class="badge badge-amber"><span class="mini-bar"><span class="mini-bar-fill" style="width:${env.progress}%"></span></span>${env.progress}%</span>`;
    else if(env.status==='failed')st=`<span class="badge badge-red">${t('status_failed')}</span>`;
    else if(env.status==='cancelled')st=`<span class="badge badge-gray">${t('status_cancelled')}</span>`;
    else st=`<span class="badge badge-gray">${t('status_not')}</span>`;
    return `<tr>
      <td class="center"><div class="check${checked?' checked':''}" onclick="toggleCheck(${env.id})"><svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="var(--btn-fg)" stroke-width="1.5" fill="none"/></svg></div></td>
      <td style="font-weight:500">${esc(env.name)}</td>
      <td><div class="soft-cell"><span class="soft-text">${esc(getSoftwareShortList(env))}</span>${more?`<i class="soft-info" onclick="showSoftList(${env.id})">i</i>`:''}</div></td>
      <td class="center">${st}</td>
      <td style="text-align:right;white-space:nowrap">
        <button class="op${busy?' disabled':''}" onclick="editEnv(${env.id})">${t('op_edit')}</button>
        <button class="op${busy?' disabled':''}" onclick="deleteEnv(${env.id})">${t('op_delete')}</button>
        <button class="op${busy?' danger':' disabled'}" onclick="stopEnv(${env.id})">${t('op_stop')}</button>
      </td></tr>`;
  }).join('');
  const all=filtered.length>0&&filtered.every(e=>selectedIds.has(e.id));
  document.getElementById('check-all').className='check'+(all?' checked':'');
}

function toggleCheck(id){selectedIds.has(id)?selectedIds.delete(id):selectedIds.add(id);renderTable();}
document.getElementById('check-all').addEventListener('click',()=>{
  const all=environments.every(e=>selectedIds.has(e.id));
  if(all)selectedIds.clear();else environments.forEach(e=>selectedIds.add(e.id));
  renderTable();
});
document.getElementById('btn-search').addEventListener('click',()=>{searchQuery=document.getElementById('search-input').value.trim();renderTable();});
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter'){searchQuery=e.target.value.trim();renderTable();}});

// ============================================================
// Create / Edit
// ============================================================
let modalItems=[];
function openCreateModal(){
  editingId=null;
  document.getElementById('modal-title').textContent=t('create_env');
  document.getElementById('modal-env-name').value='';
  modalItems=[{name:'',folder:'',dir:'',url:'',envVar:true}];
  renderInstallList();openModal('modal-create');
}
function editEnv(id){
  const env=environments.find(e=>e.id===id);
  if(!env||env.status==='installing')return;
  editingId=id;
  document.getElementById('modal-title').textContent=t('edit_env');
  document.getElementById('modal-env-name').value=env.name;
  modalItems=env.software.map(s=>({...s}));
  renderInstallList();openModal('modal-create');
}
function renderInstallList(){
  document.getElementById('install-list').innerHTML=modalItems.map((item,i)=>`
    <div class="install-item" draggable="true" data-idx="${i}">
      <div class="install-item-header"><span class="drag-handle">&#10495;</span><span class="item-num">${i+1}</span>
        <button class="item-remove" onclick="removeItem(${i})">${t('btn_remove')}</button></div>
      <div class="field-row">
        <div class="field"><div class="field-label">${t('soft_name')} <span class="optional">${t('soft_name_opt')}</span></div>
          <input type="text" value="${esc(item.name)}" onchange="modalItems[${i}].name=this.value"></div>
        <div class="field"><div class="field-label">${t('folder_name')}</div>
          <input type="text" value="${esc(item.folder)}" onchange="modalItems[${i}].folder=this.value"></div>
      </div>
      <div class="field-row"><div class="field"><div class="field-label">${t('parent_dir')}</div>
        <input type="text" value="${esc(item.dir)}" onchange="modalItems[${i}].dir=this.value"></div></div>
      <div class="field"><div class="field-label">${t('file_url')}</div>
        <input type="text" value="${esc(item.url)}" onchange="modalItems[${i}].url=this.value"></div>
      <div class="env-check-row">
        <div class="check${item.envVar?' checked':''}" onclick="modalItems[${i}].envVar=!modalItems[${i}].envVar;renderInstallList();">
          <svg width="8" height="8" viewBox="0 0 10 10"><path d="M2 5L4 7L8 3" stroke="var(--btn-fg)" stroke-width="1.5" fill="none"/></svg></div>
        <span>${t('config_env_var')}</span></div>
    </div>`).join('');
  document.querySelectorAll('.install-item').forEach(el=>{
    el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',el.dataset.idx);el.style.opacity='.4';});
    el.addEventListener('dragend',()=>{el.style.opacity='1';});
    el.addEventListener('dragover',e=>e.preventDefault());
    el.addEventListener('drop',e=>{e.preventDefault();const f=parseInt(e.dataTransfer.getData('text/plain')),to=parseInt(el.dataset.idx);if(f!==to){const it=modalItems.splice(f,1)[0];modalItems.splice(to,0,it);renderInstallList();}});
  });
}
function removeItem(i){modalItems.splice(i,1);renderInstallList();}
document.getElementById('add-install-item').addEventListener('click',()=>{modalItems.push({name:'',folder:'',dir:'',url:'',envVar:true});renderInstallList();});
document.getElementById('btn-save-env').addEventListener('click',()=>{
  const name=document.getElementById('modal-env-name').value.trim();if(!name)return;
  document.querySelectorAll('.install-item').forEach((el,i)=>{
    const inp=el.querySelectorAll('input[type="text"]');
    if(inp[0])modalItems[i].name=inp[0].value;if(inp[1])modalItems[i].folder=inp[1].value;
    if(inp[2])modalItems[i].dir=inp[2].value;if(inp[3])modalItems[i].url=inp[3].value;
  });
  if(editingId){const env=environments.find(e=>e.id===editingId);if(env){env.name=name;env.software=[...modalItems];}}
  else environments.push({id:nextId++,name,software:[...modalItems],status:'none',progress:0});
  closeModal('modal-create');renderTable();saveToDisk();
});
document.getElementById('btn-create').addEventListener('click',openCreateModal);

// ============================================================
// Delete / Stop
// ============================================================
function deleteEnv(id){
  const env=environments.find(e=>e.id===id);if(!env||env.status==='installing')return;
  if(!confirm(t('confirm_delete')))return;
  environments=environments.filter(e=>e.id!==id);selectedIds.delete(id);
  renderTable();saveToDisk();
}
function stopEnv(id){
  const env=environments.find(e=>e.id===id);if(!env||env.status!=='installing')return;
  if(hasTauri)tauriInvoke('stop_install',{envId:id}).catch(()=>{});
  env.status='cancelled';env.progress=0;
  renderTable();renderProgress();saveToDisk();
}

// ============================================================
// Install
// ============================================================
document.getElementById('btn-install').addEventListener('click',()=>{
  if(selectedIds.size===0)return;
  const toInstall=[];
  environments.forEach(env=>{
    if(selectedIds.has(env.id)&&env.status!=='installed'&&env.status!=='installing'){
      env.status='installing';env.progress=0;
      toInstall.push({id:env.id,name:env.name,software:env.software});
    }
  });
  if(!toInstall.length)return;
  renderTable();renderProgress();saveToDisk();
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.querySelector('[data-page="progress"]').classList.add('active');
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-progress').classList.add('active');
  if(hasTauri)tauriInvoke('install_environments',{envs:toInstall}).catch(e=>console.error(e));
  else simulateProgress();
});

// ============================================================
// Tauri events
// ============================================================
if(hasTauri){
  tauriListen('install-progress',e=>{
    const d=e.payload,env=environments.find(x=>x.id===d.id);if(!env)return;
    const total=env.software.length,per=100/total;
    if(d.status==='done')env.progress=Math.min(100,Math.round((d.software_index+1)*per));
    else if(d.status==='error')env.progress=Math.round(d.software_index*per);
    else env.progress=Math.round(d.software_index*per+(d.progress/100)*per);
    renderTable();renderProgress();
  });
  tauriListen('env-done',e=>{
    const d=e.payload,env=environments.find(x=>x.id===d.id);if(!env)return;
    env.status=d.status;
    if(d.status==='installed')env.progress=100;
    renderTable();renderProgress();saveToDisk();
  });
}
function simulateProgress(){
  const iv=setInterval(()=>{
    let any=false;
    environments.forEach(e=>{if(e.status==='installing'){any=true;e.progress=Math.min(100,e.progress+Math.floor(Math.random()*8)+2);if(e.progress>=100){e.status='installed';e.progress=100;}}});
    renderTable();renderProgress();if(!any)clearInterval(iv);
  },600);
}

// ============================================================
// Software popup
// ============================================================
function showSoftList(id){
  const env=environments.find(e=>e.id===id);if(!env)return;
  document.getElementById('softlist-title').textContent=env.name+' - '+t('th_software');
  document.getElementById('softlist-body').innerHTML=env.software.map(s=>`<div class="soft-popup-item"><div class="soft-popup-dot"></div>${esc(getSoftwareDisplayName(s))}</div>`).join('');
  openModal('modal-softlist');
}

// ============================================================
// Progress page
// ============================================================
function renderProgress(){
  const active=environments.filter(e=>['installing','installed','failed','cancelled'].includes(e.status));
  if(!active.length){
    document.getElementById('timeline').innerHTML=`<div style="text-align:center;color:var(--fg3);padding:40px">${t('no_env_hint')}</div>`;
    document.getElementById('total-pct').textContent='0%';document.getElementById('total-bar').style.width='0%';
    document.getElementById('progress-summary').textContent='';return;
  }
  const done=active.filter(e=>e.status==='installed').length;
  const avg=Math.round(active.reduce((s,e)=>s+e.progress,0)/active.length);
  document.getElementById('total-pct').textContent=avg+'%';document.getElementById('total-bar').style.width=avg+'%';
  document.getElementById('progress-summary').textContent=`${done}/${active.length}`;
  document.getElementById('timeline').innerHTML=active.map(env=>{
    let ic='pending',st=t('progress_pending'),sc='var(--fg3)';
    if(env.status==='installed'){ic='done';st=t('progress_done');sc='var(--green-fg)';}
    else if(env.status==='installing'){ic='running';st=env.progress+'%';sc='var(--amber-fg)';}
    else if(env.status==='failed'){ic='error';st=t('progress_error');sc='var(--red-fg)';}
    else if(env.status==='cancelled'){ic='error';st=t('progress_cancelled');sc='var(--fg3)';}
    const tasks=env.software.map((s,i)=>{
      const nm=getSoftwareDisplayName(s);let pct=0,bc='var(--bg5)',pc='var(--fg3)';
      if(env.status==='installed'){pct=100;bc='var(--green-fg)';pc='var(--green-fg)';}
      else if(env.status==='installing'){
        const per=100/env.software.length,dn=Math.floor(env.progress/per);
        if(i<dn){pct=100;bc='var(--green-fg)';pc='var(--green-fg)';}
        else if(i===dn){pct=Math.round((env.progress-dn*per)/per*100);bc='var(--amber-bar)';pc='var(--amber-fg)';}
      }
      return `<div class="tl-task"><div class="tl-task-row"><span class="tl-task-name">${esc(nm)}</span><span class="tl-task-pct" style="color:${pc}">${pct}%</span></div><div class="tl-task-bar"><div class="tl-task-bar-fill" style="width:${pct}%;background:${bc}"></div></div></div>`;
    }).join('');
    return `<div class="tl-env"><div class="tl-env-header"><div class="tl-icon ${ic}">${ic==='done'?'&#10003;':ic==='error'?'&#10005;':ic==='running'?'&#8250;':''}</div><span class="tl-env-name">${esc(env.name)}</span><span class="tl-env-status" style="color:${sc}">${st}</span></div><div class="tl-tasks">${tasks}</div></div>`;
  }).join('');
}

// ============================================================
// Update check
// ============================================================
document.getElementById('btn-check-update').addEventListener('click',async()=>{
  const el=document.getElementById('update-result');
  el.textContent=t('update_checking');el.style.color='var(--fg2)';
  if(hasTauri){
    try{
      const info=await tauriInvoke('check_update');
      if(info.has_update){
        el.innerHTML=`<span style="color:var(--green-fg)">${t('update_available').replace('{0}',info.latest)}</span> <a href="#" onclick="openLink('${info.download_url}');return false" style="color:var(--fg);text-decoration:underline;font-size:12px">${t('settings_about')}</a>`;
      } else {
        el.textContent=t('update_latest');el.style.color='var(--green-fg)';
      }
    }catch(e){el.textContent=t('update_error');el.style.color='var(--red-fg)';}
  } else {
    setTimeout(()=>{el.textContent=t('update_latest');el.style.color='var(--green-fg)';},800);
  }
});

function openModal(id){document.getElementById(id).classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.modal-overlay').forEach(m=>{m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id);});});
function openLink(url){if(hasTauri){try{window.__TAURI__.shell.open(url);}catch(e){window.open(url,'_blank');}}else window.open(url,'_blank');}
function showQR(url){document.getElementById('qr-preview-img').src=url;document.getElementById('qr-preview').classList.add('show');}

const langGrid=document.getElementById('lang-grid');
Object.values(LANGS).forEach(lang=>{

});
document.querySelectorAll('.theme-card').forEach(c=>c.addEventListener('click',()=>setTheme(c.dataset.themeVal)));

(async()=>{
